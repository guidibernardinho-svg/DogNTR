name: DogNTR macOS Build (Stable)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 🧱 Verify project structure
        run: |
          ls -R

      - name: 🚀 Run DogNTR (TEST MODE)
        run: |
          cd src
          python3 server.py

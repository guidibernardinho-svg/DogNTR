name: DogNTR macOS App Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧱 Build real .app structure
        run: |
          APP="DogNTR.app"

          mkdir -p $APP/Contents/MacOS
          mkdir -p $APP/Contents/Resources

      - name: 📁 Copy project
        run: |
          cp -R src $APP/Contents/MacOS/
          cp config.json $APP/Contents/Resources/

      - name: 🚀 Create EXECUTABLE (IMPORTANT FIX)
        run: |
          cat << 'EOF' > DogNTR.app/Contents/MacOS/DogNTR
          #!/bin/bash

          cd "$(dirname "$0")"

          export PYTHONPATH="$(pwd)/src"

          python3 src/server.py
          EOF

          chmod +x DogNTR.app/Contents/MacOS/DogNTR

      - name: 🍎 FIXED Info.plist (CRITICAL)
        run: |
          cat << 'EOF' > DogNTR.app/Contents/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>DogNTR</string>

              <key>CFBundleDisplayName</key>
              <string>DogNTR</string>

              <key>CFBundleIdentifier</key>
              <string>com.dogntr.app</string>

              <key>CFBundleVersion</key>
              <string>1.0</string>

              <key>CFBundleExecutable</key>
              <string>DogNTR</string>

              <key>CFBundlePackageType</key>
              <string>APPL</string>

              <key>LSMinimumSystemVersion</key>
              <string>10.13</string>
          </dict>
          </plist>
          EOF

      - name: 📦 Zip app
        run: |
          zip -r DogNTR-macOS.zip DogNTR.app

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DogNTR-app
          path: DogNTR-macOS.zip

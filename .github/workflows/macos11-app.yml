name: Build DogNTR macOS App (No PyInstaller)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-11

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧱 Create .app structure
        run: |
          APP="DogNTR.app"
          
          mkdir -p $APP/Contents/MacOS
          mkdir -p $APP/Contents/Resources

      - name: 🐍 Copy Python backend
        run: |
          cp -R src $APP/Contents/MacOS/
          cp config.json $APP/Contents/Resources/

      - name: 🧠 Create launcher script
        run: |
          cat << 'EOF' > DogNTR.app/Contents/MacOS/DogNTR
          #!/bin/bash
          cd "$(dirname "$0")"

          echo "🎮 DogNTR starting..."

          python3 src/server.py
          EOF

          chmod +x DogNTR.app/Contents/MacOS/DogNTR

      - name: 🍎 Create Info.plist
        run: |
          cat << 'EOF' > DogNTR.app/Contents/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>DogNTR</string>

              <key>CFBundleDisplayName</key>
              <string>DogNTR</string>

              <key>CFBundleIdentifier</key>
              <string>com.dogntr.app</string>

              <key>CFBundleVersion</key>
              <string>1.0</string>

              <key>CFBundleExecutable</key>
              <string>DogNTR</string>

              <key>CFBundlePackageType</key>
              <string>APPL</string>
          </dict>
          </plist>
          EOF

      - name: 📦 Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: DogNTR-macOS-app
          path: DogNTR.app
